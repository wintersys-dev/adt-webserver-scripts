include "modules.conf"
include "mimetypes.conf"

server.document-root = "/var/www/html"

$SERVER["socket"] == ":443" {

##XXXXWHITE-LISTXXXX
##XXXXWHITE-LISTXXXXserver.error-handler-403 = "/error-403.php" 

#XXXXBASIC-AUTHXXXX$HTTP["remoteip"] !~ "XXXXBUILD_MACHINE_IPXXXX|XXXXVPC_IP_RANGEXXXX|127.0.0.1" {
#XXXXBASIC-AUTHXXXXauth.backend = "htpasswd"
#XXXXBASIC-AUTHXXXXauth.backend.htpasswd.userfile = "/etc/lighttpd/.htpasswd"
#XXXXBASIC-AUTHXXXXauth.require = ( "" => ("method" => "basic", "realm" => "Visit XXXXWEBSITEURLXXXXX to generate a new password if you need to", "require" => "valid-user") )
#XXXXBASIC-AUTHXXXX}

ssl.engine = "enable"
ssl.pemfile = "XXXXHOMEXXXX/ssl/live/XXXXWEBSITEURLXXXX/fullchain.pem"
ssl.privkey = "XXXXHOMEXXXX/ssl/live/XXXXWEBSITEURLXXXX/privkey.pem"
ssl.openssl.ssl-conf-cmd = ("Ciphersuites" => "TLS_AES_128_GCM_SHA256")+("Protocol" => "-ALL, TLSv1.3, TLSv1.2")+("Curves" => "secp384r1")
ssl.disable-client-renegotiation = "enable"
ssl.use-compression = "disable" #The CRIME attack exploits compression so we need to disable that

proxy.balance = "hash"
proxy.server = (
"" => (
#xxxxWEBSERVERIPHTTPSxxxx
)
)
}

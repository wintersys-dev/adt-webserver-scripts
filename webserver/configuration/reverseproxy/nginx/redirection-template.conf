#XXXXS3_REDIRECTIONXXXX

location /XXXXASSETSXXXX/ 
{
        rewrite ^/XXXXASSETSXXXX/(.*) /$1 break;
        proxy_http_version     1.1;
        proxy_set_header       Referer "https://XXXXREFERERXXXX";
        proxy_set_header       Host "XXXXS3_HOST_URLXXXX";
        proxy_set_header       Cookie "";
        proxy_pass             "https://XXXXS3_HOST_URLXXXX";
}

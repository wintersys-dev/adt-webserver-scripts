#XXXXS3_REDIRECTIONXXXX

location /XXXXASSETSXXXX/ 
{
        rewrite ^/XXXXASSETSXXXX/(.*) /$1 break;
        proxy_http_version     1.1;
        proxy_set_header       Referer "https://XXXXREFERERXXXX";
        proxy_set_header       Host "XXXXS3_HOST_URLXXXX";
        proxy_set_header       Cookie "";
        proxy_pass             "https://XXXXS3_HOST_URLXXXX";
        proxy_intercept_errors on;
        error_page 404 = @fallback_XXXXASSETSXXXX;
}

location @fallback_XXXXASSETSXXXX
{
  rewrite ^/(.*) /XXXXASSETSXXXX/$1 break;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_cache my_cache;
  proxy_cache_valid 200 302 60m;
  proxy_cache_valid 404 1m;
  proxy_pass https://webservers_https;
  # re-write redirects to http as to https
}

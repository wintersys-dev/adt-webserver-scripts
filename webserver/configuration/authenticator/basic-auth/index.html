<!DOCTYPE html>
<html>
<head>
    <title>Basic Auth Password Initialisation</title>
</head>

    <body>
        <div class="main">
                <h2>Please provide your email address which must be for a: @XXXXUSEREMAILDOMAINXXXX domain..</h2>
                <h2>You will receive your new password at the email address you enter which you can then use to authenticate at the popup you will see at the main site</h2>
            <form action="submit.php" method="post">
                <input type="email" name="email" placeholder="Email Address:" pattern=".*@XXXXUSEREMAILDOMAINXXXX" required autocomplete="off" onkeydown="return (event.keyCode!=13);" >
                <br></br>
                <input title="" type="submit" name="submit" value="Submit">
            </form>
        </div>
    </body>
</html>

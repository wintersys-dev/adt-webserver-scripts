# Hide server version on error pages
ServerSignature Off

SSLSessionCache "shmcb:/var/logs/apache2/ssl_scache(512000)"
ServerName XXXXWEBSITEURLXXXX
#XXXXMODSECURITYXXXX

<VirtualHost *:443>
 ServerAdmin webmaster@XXXXROOTDOMAINXXXX
 DocumentRoot /var/www/html

 SSLEngine on

 SSLCertificateFile       XXXXHOMEXXXX/ssl/live/XXXXWEBSITEURLXXXX/fullchain.pem
 SSLCertificateKeyFile    XXXXHOMEXXXX/ssl/live/XXXXWEBSITEURLXXXX/privkey.pem
# SSLCACertificateFile /etc/apache2/ssl/ca.pem
 
SSLProtocol -ALL +TLSv1.2 +TLSv1.3

 # Compilation of the top cipher suites 2024
 # https://ssl-config.mozilla.org/#server=apache
 SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305
 
 # Perfect Forward Secrecy(PFS) is frequently compromised without this
 SSLHonorCipherOrder on
 SSLCompression off
 SSLSessionTickets off

 # Enable SSL session caching for improved performance
 SSLSessionCacheTimeout 300

 SSLOpenSSLConfCmd DHParameters "/etc/ssl/certs/dhparam.pem"
 
 # Security headers
 ## X-Content-Type-Options
 Header set X-Content-Type-Options "nosniff"
    
 ## Content-Security-Policy
 Header set Content-Security-Policy "frame-ancestors 'self';"
    
 ## Strict Transport Security (HSTS)
 Header set Strict-Transport-Security "max-age=31536000; includeSubdomains; preload"

 #XXXXFASTCGISOCKETXXXX<FilesMatch \.php$>
 #XXXXFASTCGISOCKETXXXX   <If "-f %{REQUEST_FILENAME}">
 #XXXXFASTCGISOCKETXXXX    SetHandler "proxy:unix:/var/run/phpXXXXPHPVERSIONXXXX-fpm.sock|fcgi://localhost"
 #XXXXFASTCGISOCKETXXXX   </If>
 #XXXXFASTCGISOCKETXXXX</FilesMatch>

 #XXXXFASTCGIPORTXXXX<FilesMatch ".+\.php$">
 #XXXXFASTCGIPORTXXXX    <If "-f %{REQUEST_FILENAME}">
 #XXXXFASTCGIPORTXXXX        SetHandler proxy:fcgi://localhost:XXXXPORTXXXX   
 #XXXXFASTCGIPORTXXXX    </If>
 #XXXXFASTCGIPORTXXXX</FilesMatch>

#XXXXREQUEST_PROXYXXXSSLProxyEngine On
#XXXXREQUEST_PROXYXXXSSLProxyVerify none
#XXXXREQUEST_PROXYXXXSSLProxyCheckPeerCN off
#XXXXREQUEST_PROXYXXXSSLProxyCheckPeerName off
#XXXXREQUEST_PROXYXXXSSLProxyCheckPeerExpire off
#XXXXREQUEST_PROXYXXXProxyRequests Off
#XXXXREQUEST_PROXYXXXProxyPreserveHost On
#XXXXREQUEST_PROXYXXXHeader add Set-Cookie "ROUTEID=.%{BALANCER_WORKER_ROUTE}e; path=/" env=BALANCER_ROUTE_CHANGED
#XXXXREQUEST_PROXYXXX<Proxy "balancer://reverseproxy_https">
#XXXXREQUEST_PROXYXXX#xxxxREVERSEPROXYIPHTTPSxxxx

#XXXXREQUEST_PROXYXXXProxySet stickysession=ROUTEID
#XXXXREQUEST_PROXYXXX</Proxy>

#XXXXREQUEST_PROXYXXXProxyRequests Off
#XXXXREQUEST_PROXYXXXProxyPreserveHost On
#XXXXREQUEST_PROXYXXX<Proxy *>
#XXXXREQUEST_PROXYXXX     Require all granted
#XXXXREQUEST_PROXYXXX</Proxy>
#XXXXREQUEST_PROXYXXXProxyPass / "balancer://reverseproxy_https/"
#XXXXREQUEST_PROXYXXXProxyPassReverse / "balancer://reverseproxy_https/"

#XXXXREQUEST_PROXYXXXRequestHeader set X-Forwarded-Proto expr=%{REQUEST_SCHEME}
#XXXXREQUEST_PROXYXXXRequestHeader set X-Forwarded-Host expr=%{HTTP_HOST}
#XXXXREQUEST_PROXYXXXRequestHeader set X-Forwarded-Proto "https"
#XXXXREQUEST_PROXYXXXRequestHeader set X-Forwarded-Port "443"
#XXXXREQUEST_PROXYXXXRequestHeader set X-Forwarding-For expr=%{HTTP_HOST}

#XXXXWEBROOTXXX DirectoryIndex index.html
#XXXXWEBROOTXXX 
#XXXXWEBROOTXXX <Directory /var/www/html>
#XXXXWEBROOTXXX         Options +FollowSymlinks -Includes -ExecCGI -Indexes
#XXXXWEBROOTXXX         AllowOverride All
#XXXXWEBROOTXXX         Require all granted
#XXXXWEBROOTXXX </Directory>


 
 # Log
 ErrorLog ${APACHE_LOG_DIR}/error.log
 CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
